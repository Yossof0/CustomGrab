<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test</title>
  <style>
    button {
      position: absolute;
      right: 45%;
      top: 40%;
      width: 100px;
      height: 100px;
      border: none;
      background-color: orange;
      color: white;
      font-size: 16px;
      border-radius: 8px;
    }
    .grab {
      cursor: grab;
    }
  </style>
</head>
<body>
  <button class="grab">Grab</button>
</body>
</html>
