<!DOCTYPE html>
<html>
<head>
<style>
:root { --accent:#4caf50; --bg:#1a1a1a; --text:#e5e5e5; --card:#242424; --border:rgba(180,180,180,0.15); --panel:#1f1f1f; --shadow:rgba(0,0,0,0.5); --proper:#f0f0f0; }
body { background:var(--bg); color:var(--text); font-family:Arial,sans-serif; padding:2rem; }

button { margin-top: 0.75rem; padding: .5rem 1rem; background: var(--accent); color: #fff; border: none; border-radius: 5px; cursor: pointer; }
button.danger { background: #e04b4b; }

.pack-grid { display: grid; grid-template-columns: 1fr; gap: 0.4rem; }
.pack-grid.view-list .pack-card { flex-direction: row; align-items: center; padding: 0.5rem 0.75rem; gap: 0.5rem; overflow: hidden; }
.pack-grid.view-list .pack-card .old-badge     { display: none; }
.pack-grid.view-list .pack-card .card-info-row { display: none; }
.pack-grid.view-list .pack-card .tag-row       { display: none; }
.pack-grid.view-list .pack-card .thumbs        { order: -2; flex-wrap: nowrap; flex-shrink: 0; }
.pack-grid.view-list .pack-card .thumbs img    { width: 32px; height: 32px; }
.pack-grid.view-list .pack-card .pack-desc-icon { order: -1; position: static; transform: none; top: auto; right: auto; flex-shrink: 0; }
.pack-grid.view-list .pack-card .pack-card-title { order: 0; margin: 0; font-size: 0.9rem; flex: 1; min-width: 0; padding-right: 0; }
.pack-grid.view-list .pack-card .card-badge-row { order: 1; display: flex !important; align-items: center; flex-shrink: 0 !important; flex-grow: 0 !important; width: 172px !important; gap: 0; }
.pack-grid.view-list .pack-card .card-badge-row .badge { width: 54px !important; flex-shrink: 0; flex-grow: 0; justify-content: center; }
.pack-grid.view-list .pack-card .card-badge-row .src-slot { width: 90px !important; min-width: 0 !important; flex-shrink: 0; flex-grow: 0; justify-content: flex-start; }
.pack-grid.view-list .pack-card .card-badge-row .fav-btn { width: 28px !important; flex-shrink: 0; flex-grow: 0; justify-content: center; }
.pack-grid.view-list .pack-card .pack-actions   { order: 2; display: flex; flex-direction: row; flex-shrink: 0; flex-grow: 0; flex-wrap: nowrap; margin-top: 0; padding-top: 0; gap: 0.3rem; width: 134px; }
.pack-grid.view-list .pack-card .pack-actions button { flex: 1; margin-top: 0; padding: 0.3rem 0.65rem; }
.pack-card .card-badge-row { display: none; }
.pack-card .old-badge { position: absolute; right: 0.5rem; top: 0.5rem; }

.pack-card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 0.75rem; display: flex; flex-direction: column; gap: 0.5rem; position: relative; }
.pack-card-title { display: flex; align-items: center; gap: 0.3rem; margin: 0 0 0.25rem; padding-right: 2rem; }
.pack-card-title > span { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pack-desc-icon { pointer-events: all; position: absolute; top: 2.4rem; right: 0.5rem; width:17px; height:17px; border-radius:50%; border:1.5px solid var(--border); font-size:0.7rem; display:inline-flex; align-items:center; justify-content:center; }
.pack-card .thumbs { display: flex; gap: 0.4rem; flex-wrap: wrap; }
.pack-card .thumbs img { width: 40px; height: 40px; border: 1px solid var(--border); border-radius: 8px; background:#333; }
.pack-card .tag-row { display: flex; flex-wrap: wrap; gap: 0.15rem; }
.card-info-row { display: flex; align-items: center; justify-content: space-between; width: 100%; margin-top: auto; padding-top: 0.35rem; }
.card-badge-row { display: flex; align-items: center; gap: 0.3rem; width: 100%; pointer-events: none; }
.card-badge-row .badge, .card-badge-row .fav-btn { pointer-events: all; }
.src-slot { display: flex; align-items: center; min-width: 72px; }
.pack-card .pack-actions { display: flex; gap: 0.25rem; flex-wrap: wrap; margin-top: auto; padding-top: 0.35rem; }
.pack-card .pack-actions button { flex: 1 1 100%; }
.pack-card .badge { position: absolute; right: 0.5rem; top: 0.5rem; padding: 0.2rem 0.55rem; border-radius: 999px; font-size: 0.75rem; border: 1px solid var(--border); background: rgba(255,255,255,0.85); cursor: pointer; color: var(--proper); }
.card-badge-row .badge { position: static; display:inline-flex; align-items:center; justify-content:center; height:22px; padding:0 0.55rem; border-radius:999px; font-size:0.7rem; border:1px solid var(--border); background:var(--bg); cursor:pointer; color:var(--text); white-space:nowrap; line-height:1; }
.card-badge-row .badge.badge-active { background:var(--accent); color:#fff; border-color:transparent; }
.src-badge { display:inline-flex; align-items:center; justify-content:center; height:22px; padding:0 0.5rem; gap:0.25rem; border-radius:999px; font-size:0.68rem; white-space:nowrap; line-height:1; }
.src-badge.src-builtin  { background:rgba(99,102,241,0.12); color:#818cf8; }
.src-badge.src-installed{ background:rgba(34,197,94,0.12);  color:#4ade80; }
.src-badge.src-created  { background:rgba(251,191,36,0.12); color:#fbbf24; }
.src-badge.src-imported { background:rgba(139,92,246,0.12); color:#a78bfa; }
.pack-card .fav-btn { background: none; border: none; cursor: pointer; padding: 0.1rem 0.2rem; margin: 0; line-height: 1; display: inline-flex; align-items: center; width: auto; flex: 0 0 auto; }

/* ruler overlay */
.ruler { position:fixed; top:0; left:0; width:100%; pointer-events:none; z-index:9999; }
</style>
</head>
<body>
<h2>List view alignment debug — 4 card types</h2>
<div id="grid" class="pack-grid view-list"></div>

<!-- ruler lines drawn by JS -->
<canvas class="ruler" id="ruler"></canvas>

<div id="log" style="margin-top:2rem;font-family:monospace;font-size:0.75rem;background:#111;padding:1rem;border-radius:8px;white-space:pre-wrap;"></div>

<script>
const log = s => document.getElementById('log').textContent += s + '\n';
const img1px = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==';

const packs = [
  { name:'Mac OS',        type:'builtin',   active:true  },
  { name:'Win11 Light',   type:'builtin',   active:false },
  { name:'My Custom Pack',type:'created',   active:false },
  { name:'Imported Pack', type:'imported',  active:false },
  { name:'Marketplace',   type:'installed', active:false },
];

packs.forEach(pack => {
  const card = document.createElement('div');
  card.className = 'pack-card' + (pack.active ? ' active' : '');

  // old badge (hidden in list)
  const badge = document.createElement('button');
  badge.className = 'badge old-badge';
  badge.textContent = pack.active ? 'Active' : 'Use';

  const title = document.createElement('h4');
  title.className = 'pack-card-title';
  title.innerHTML = `<span>${pack.name}</span>`;

  const thumbs = document.createElement('div');
  thumbs.className = 'thumbs';
  thumbs.innerHTML = `<img src="${img1px}"><img src="${img1px}">`;

  const tagRow = document.createElement('div'); tagRow.className = 'tag-row';
  const infoRow = document.createElement('div'); infoRow.className = 'card-info-row';

  const badgeRow = document.createElement('div');
  badgeRow.className = 'card-badge-row';

  const useBadge = document.createElement('button');
  useBadge.className = 'badge' + (pack.active ? ' badge-active' : '');
  useBadge.textContent = pack.active ? 'Active' : 'Use';
  badgeRow.appendChild(useBadge);

  const srcSlot = document.createElement('div');
  srcSlot.className = 'src-slot';
  if (pack.type === 'builtin') {
    srcSlot.innerHTML = `<span class="src-badge src-builtin">★ Built-in</span>`;
  } else if (pack.type === 'installed') {
    srcSlot.innerHTML = `<span class="src-badge src-installed">↓ Installed</span>`;
  } else if (pack.type === 'imported') {
    srcSlot.innerHTML = `<span class="src-badge src-imported">↑ Imported</span>`;
  } else {
    srcSlot.innerHTML = `<span class="src-badge src-created">+ Created</span>`;
  }
  badgeRow.appendChild(srcSlot);

  const fav = document.createElement('button');
  fav.className = 'fav-btn';
  fav.textContent = '☆';
  badgeRow.appendChild(fav);

  const actions = document.createElement('div');
  actions.className = 'pack-actions';
  if (pack.type !== 'builtin') {
    const del = document.createElement('button');
    del.className = 'danger'; del.textContent = 'Delete'; del.style.marginTop='0';
    actions.appendChild(del);
  }
  const clone = document.createElement('button');
  clone.textContent = 'Clone'; clone.style.marginTop='0';
  actions.appendChild(clone);

  const descIcon = document.createElement('i');
  descIcon.className = 'pack-desc-icon'; descIcon.textContent = 'i';

  card.appendChild(badge);
  card.appendChild(title);
  card.appendChild(thumbs);
  card.appendChild(tagRow);
  card.appendChild(infoRow);
  card.appendChild(badgeRow);
  card.appendChild(actions);
  card.appendChild(descIcon);

  document.getElementById('grid').appendChild(card);
});

setTimeout(() => {
  const cards = document.querySelectorAll('.pack-card');
  log('=== Per-card badge-row child x positions ===\n');

  cards.forEach((card, i) => {
    const br = card.querySelector('.card-badge-row');
    const badge = br.querySelector('.badge');
    const slot = br.querySelector('.src-slot');
    const fav = br.querySelector('.fav-btn');
    const brRect = br.getBoundingClientRect();
    log(`Card ${i} (${packs[i].type}): badge-row x=${Math.round(brRect.x)} w=${Math.round(brRect.width)}`);
    log(`  .badge    x=${Math.round(badge.getBoundingClientRect().x)} w=${Math.round(badge.getBoundingClientRect().width)}`);
    log(`  .src-slot x=${Math.round(slot.getBoundingClientRect().x)} w=${Math.round(slot.getBoundingClientRect().width)}`);
    log(`  .fav-btn  x=${Math.round(fav.getBoundingClientRect().x)} w=${Math.round(fav.getBoundingClientRect().width)}`);
    log('');
  });
}, 200);
</script>
</body>
</html>
